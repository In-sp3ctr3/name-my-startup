[build]
  command = "npx --yes pnpm@10.18.3 build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.18.3"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"
  SECRETS_SCAN_OMIT_KEYS = "AI_PRIMARY_PROVIDER,AI_FALLBACK_PROVIDER,JOB_EXECUTION_MODE"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."jobs-sweep"]
  schedule = "@hourly"

[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/config"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/config*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/settings.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/js/env.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/js/config.js"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
